<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="shortcut icon"
    href="https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-mono/128/Gem-Stone-icon.png" width="128"
    height="128" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <title>Such A Little Gem —— ephemeral blaze in your browser</title>
  <style>
    :root {
      font-size: 12px;
    }

    *,
    *::after,
    *::before {
      padding: 0;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #000;
      min-height: 100vh;
      height: 100%;
      color: #fff;
      font-family: 'Roboto Serif';
    }

    header {
      position: fixed;
      width: 100%;
      height: 100%;
      color: white;
      user-select: none;
      pointer-events: none;
    }

    header h1 {
      position: absolute;
      padding: 1rem 2rem;
      font-family: 'Cinzel Decorative';
      font-size: 1rem;
      font-weight: bolder;
    }

    .lt {
      top: 1rem;
      left: 1rem;
    }

    .rt {
      top: 1rem;
      right: 1rem;
    }

    .lb {
      bottom: 1rem;
      left: 1rem;
    }

    .rb {
      bottom: 1rem;
      right: 1rem;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .card {
      position: relative;
      width: 265px;
      height: 374px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      background-image: url(./assets/images/frame.svg);
      border-radius: .5rem;
      transition: all 1s;
      cursor: pointer;
      overflow: hidden;
      /* transform-style: preserve-3d; */
    }

    .card:hover {
      box-shadow: 0 0 5px rgba(255, 255, 255, .4),
        0 0 25px rgba(255, 255, 255, .4),
        0 0 50px rgba(255, 255, 255, .4),
        0 0 200px rgba(255, 255, 255, .4);
    }

    .overlay {
      position: absolute;
      top: 0px;
      left: 0;
      width: 100%;
      height: 975px;
      /* background: linear-gradient(45deg, #757575 0%, #9E9E9E 45%, #E8E8E8 70%, #9E9E9E 85%, #757575 90% 100%); */
      background: linear-gradient(45deg, #B67B03 0%, #DAAF08 45%, #FEE9A0 70%, #DAAF08 85%, #B67B03 90% 100%);
      animation: gradient 2s linear 0s alternate infinite;
    }

    @keyframes gradient {
      from {
        top: 0px;
      }

      to {
        top: -600px;
      }
    }

    .frame {
      position: absolute;
      inset: 0;
    }

    .caption {
      font-family: 'Cinzel Decorative';
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin: 2rem;
      text-shadow: 0 0 5px #fff;
    }

    #gem {
      position: relative;
      width: 20rem;
      height: 20rem;
      display: grid;
      place-items: center;
      transform: scale(64%);
      /* transform: translateZ(1.5rem); */
    }

    #gem .top {
      width: 10rem;
      height: 10rem;
      background-image: linear-gradient(150deg, #44405b, #fff 40%, #fff);
      clip-path: polygon(50% 12.2%, 72% 20%, 82% 36%, 72% 52%, 50% 60%, 28% 52%, 18% 36%, 28% 20%, 50% 12.2%);
    }

    #gem .top-effect {
      position: absolute;
      width: 10rem;
      height: 10rem;
      clip-path: polygon(50% 12.2%, 72% 20%, 82% 36%, 72% 52%, 50% 60%, 28% 52%, 18% 36%, 28% 20%, 50% 12.2%);
      background-color: #fff;
      opacity: 0;
      animation: 2s linear 2s infinite glisten;
    }

    @keyframes glisten {
      from {
        opacity: 0;
      }

      80% {
        opacity: 0;
      }

      90% {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    #gem .triangle {
      position: absolute;
      width: 8rem;
      height: 8rem;
    }

    #gem .triangle-1 {
      clip-path: polygon(50% 0, 77% 30%, 23% 30%);
      bottom: 1rem;
      left: 6rem;
      background-image: linear-gradient(to top, #44405b, #fff 80%, #fff);
    }

    #gem .triangle-2 {
      clip-path: polygon(75% 30%, 25% 30%, 50% 80%);
      left: 6rem;
      bottom: 1rem;
      background-color: white;
    }

    #gem .triangle-3 {
      clip-path: polygon(77% 30%, 23% 30%, 50% 80%);
      bottom: 1rem;
      left: 6rem;
      background-image: linear-gradient(210deg, #44405b, #fff 60%, #fff);
    }

    #gem .triangle-4 {
      clip-path: polygon(23% 2.2%, 50% 12%, 23% 42%);
      bottom: calc(2rem - .5px);
      left: 6rem;
      background-image: linear-gradient(to left, #44405b, #fff 80%, #fff);
    }

    #gem .triangle-5 {
      clip-path: polygon(23% 2.2%, 50% 12%, 23% 42%);
      bottom: calc(2rem - .5px);
      left: 6rem;
      transform: rotateY(180deg);
      background-image: linear-gradient(to right, #44405b, #fff 90%, #fff);
    }

    #gem .triangle-6 {
      clip-path: polygon(100% 0, 100% 40%, 65% 21%);
      bottom: 1.8rem;
      left: -2px;
      background-image: linear-gradient(to right, #44405b, #44405b 1%, #fff);
    }

    #gem .triangle-14 {
      clip-path: polygon(100% 0, 100% 40%, 65% 21%);
      bottom: 1.8rem;
      right: -2px;
      transform: rotateY(180deg);
      background-image: linear-gradient(to right, #44405b, #fff);
    }

    #gem .triangle-7 {
      clip-path: polygon(38% 0, 73% 19%, 100% 69%);
      bottom: .1rem;
      left: 2rem;
      background-image: linear-gradient(-60deg, #44405b, #fff 60%, #fff);
    }

    #gem .triangle-13 {
      clip-path: polygon(38% 0, 73% 19%, 100% 69%);
      bottom: .1rem;
      right: 2rem;
      transform: rotateY(180deg);
      background-image: linear-gradient(150deg, #44405b, #fff 60%, #fff);
    }

    #gem .triangle-8 {
      clip-path: polygon(39% 100%, 74% 78.5%, 61% 58%);
      top: calc(4rem - 1px);
      left: calc(2rem - 1px);
      background-image: linear-gradient(-30deg, #44405b, #fff 40%, #fff);
    }

    #gem .triangle-15 {
      clip-path: polygon(39% 100%, 74% 78.5%, 61% 58%);
      top: calc(4rem - 1px);
      right: calc(2rem - 1px);
      transform: rotateY(180deg);
      background-image: linear-gradient(30deg, #44405b, #fff 60%, #fff);
    }

    #gem .triangle-9 {
      clip-path: polygon(39% 100%, 39% 50%, 61% 58%);
      top: calc(4rem - 2px);
      left: calc(2rem - 1px);
      background-image: linear-gradient(120deg, #44405b, #44405b 30%, #fff 60%, #fff);
    }

    #gem .triangle-16 {
      clip-path: polygon(39% 100%, 39% 50%, 61% 58%);
      top: calc(4rem - 2px);
      right: calc(2rem - 1px);
      transform: rotateY(180deg);
      background-image: linear-gradient(60deg, #44405b, #fff 45%, #fff);
    }

    #gem .triangle-10 {
      clip-path: polygon(39% 50%, 61% 59%, 73.5% 39.5%);
      top: calc(4rem - 2px);
      left: calc(2rem - 1px);
      background-image: linear-gradient(to left, #44405b, #fff 80%, #fff);
    }

    #gem .triangle-17 {
      clip-path: polygon(39% 50%, 61% 59%, 73.5% 39.5%);
      top: calc(4rem - 2px);
      right: calc(2rem - 1px);
      transform: rotateY(180deg);
      background-image: linear-gradient(to left, #44405b, #fff 80%, #fff);
    }

    #gem .triangle-11 {
      clip-path: polygon(39% 50%, 73.5% 39.5%, 72% 30%);
      top: calc(4rem - 2px);
      left: calc(2rem - 1px);
      background-image: linear-gradient(150deg, #44405b, #fff 40%, #fff);
    }

    #gem .triangle-18 {
      clip-path: polygon(39% 50%, 73.5% 39.5%, 72% 30%);
      top: calc(4rem - 2px);
      right: calc(2rem - 1px);
      transform: rotateY(180deg);
      background-image: linear-gradient(150deg, #44405b, #fff 40%, #fff);
    }

    #gem .triangle-12 {
      clip-path: polygon(73.5% 39.5%, 72% 30%, 100% 30%);
      top: calc(4rem - 2px);
      left: calc(2rem - 1px);
      background-image: linear-gradient(to left, #44405b, #fff 80%, #fff);
    }

    #gem .triangle-19 {
      clip-path: polygon(73.5% 39.5%, 72% 30%, 100% 30%);
      top: calc(4rem - 2px);
      right: calc(2rem - 1px);
      transform: rotateY(180deg);
      background-image: linear-gradient(to left, #44405b, #fff 80%, #fff);
    }

    #gem .effect {
      position: absolute;
      max-width: 4rem;
      max-height: 4rem;
      transform-origin: center;
    }

    .effect-1 {
      top: 6rem;
      left: 3rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    .effect-2 {
      animation: 2s ease-in 1.6s infinite spin;
      opacity: 0;
    }

    .effect-3 {
      top: 4.2rem;
      right: 5.5rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    .effect-4 {
      top: 6rem;
      right: 3.2rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    @keyframes sparkle {
      from {
        transform: scale(0.2);
      }

      to {
        transform: scale(1.2);
      }
    }

    @keyframes spin {
      from {
        top: 10rem;
        right: 3rem;
        transform: rotate(0) scale(1.6);
        opacity: 1;
      }

      30% {
        top: 16rem;
        right: 8rem;
        transform: rotate(360deg) scale(0);
        opacity: 1;
      }

      to {
        top: 16rem;
        right: 8rem;
        transform: rotate(360deg) scale(0);
        opacity: 1;
      }
    }

    footer {
      margin-top: auto;
      padding: 2rem 0;
      text-align: center;
      font-family: 'Cinzel Decorative';
      font-size: .8rem;
      font-weight: 500;
    }

    footer a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
  <script src="jquery.js" defer></script>
  <script src="tilt.jquery.js" defer></script>
</head>

<body>
  <header>
    <h1 class="lt">Such</h1>
    <h1 class="rt">A</h1>
    <h1 class="lb">Little</h1>
    <h1 class="rb">Gem</h1>
  </header>
  <main>
    <p class="caption">Diamond</p>
    <section class="card" data-tilt>
      <div class="overlay"></div>
      <img class="frame" src="./assets/images/frame.svg" alt="">
      <article id="gem">
        <div class="top"></div>
        <div class="top-effect"></div>
        <div class="triangle triangle-1"></div>
        <div class="triangle triangle-2"></div>
        <div class="triangle triangle-3"></div>
        <div class="triangle triangle-4"></div>
        <div class="triangle triangle-5"></div>
        <div class="triangle triangle-6"></div>
        <div class="triangle triangle-7"></div>
        <div class="triangle triangle-8"></div>
        <div class="triangle triangle-9"></div>
        <div class="triangle triangle-10"></div>
        <div class="triangle triangle-11"></div>
        <div class="triangle triangle-12"></div>
        <div class="triangle triangle-13"></div>
        <div class="triangle triangle-14"></div>
        <div class="triangle triangle-15"></div>
        <div class="triangle triangle-16"></div>
        <div class="triangle triangle-17"></div>
        <div class="triangle triangle-18"></div>
        <div class="triangle triangle-19"></div>
        <img class="effect effect-1" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-2" src="./assets/images/spinning.png" alt="">
        <img class="effect effect-3" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-4" src="./assets/images/sparkling.png" alt="">
      </article>
    </section>
  </main>
  <footer>
    <span><a href="https://jeromejoh.github.io/" target="_blank" title="author's page">&copy; Jerome Joh</a>, All right
      reserved.</span>
  </footer>
</body>

</html>
