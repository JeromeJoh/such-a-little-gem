<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="shortcut icon"
    href="https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-mono/128/Gem-Stone-icon.png" width="128"
    height="128" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <title>Such A Little Gem —— ephemeral blaze in your browser</title>
  <style>
    .overlay {
      mask-image: url(./assets/images/ellipse.svg);
    }

    #gem {
      position: relative;
      bottom: 4%;
      width: 96px;
      height: 240px;
      display: grid;
      place-items: center;
      clip-path: path("M 48 0 A86 134 0 0 0 48 240 A86 134 0 0 0 48 0");
      transform: scale(48%) rotate(-90deg);
      background-color: #82c0f9;
      /* transform: translateZ(1.5rem); */
    }

    .effect-group {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translateX(-50%) translateY(-50%) scale(48%) rotate(-90deg);
      width: 96px;
      height: 240px;
    }

    #gem .top {
      width: 96px;
      height: 240px;
      background: #82c0f9;
      clip-path: polygon(50% 16%, 68% 28%, 76% 50%, 68% 72%, 50% 85%, 32% 72%, 24% 50%, 32% 28%);
    }

    #gem .facade {
      position: absolute;
      width: 96px;
      height: 240px;
    }

    #gem .left-qua {
      clip-path: polygon(24% 50%, 18% 36%, 0% 50%, 18% 64%);
      background-color: #4cb4cd;
    }

    #gem .right-qua {
      clip-path: polygon(24% 50%, 18% 36%, 0% 50%, 18% 64%);
      background-color: #78c7eb;
      transform: rotateY(180deg);
    }

    #gem .lt-tri-1 {
      clip-path: polygon(24% 50%, 18% 36%, 32% 28%);
      background-color: #a3d7e9;
    }

    #gem .rt-tri-1 {
      clip-path: polygon(24% 50%, 18% 36%, 32% 28%);
      background-color: #cdfefd;
      transform: rotateY(180deg);
    }

    #gem .rb-tri-1 {
      clip-path: polygon(24% 50%, 18% 36%, 32% 28%);
      background-color: #bee899;
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-1 {
      clip-path: polygon(24% 50%, 18% 36%, 32% 28%);
      background-color: #86e9d2;
      transform: rotateX(180deg);
    }

    #gem .lt-tri-2 {
      clip-path: polygon(50% 16%, 32% 28%, 37% 13%);
      background-color: #cceff0;
    }

    #gem .rt-tri-2 {
      clip-path: polygon(50% 16%, 32% 28%, 37% 13%);
      background-color: #4160a2;
      transform: rotateY(180deg);
    }

    #gem .rb-tri-2 {
      clip-path: polygon(50% 16%, 32% 28%, 37% 13%);
      background-color: #438dc0;
      transform: rotateY(180deg) rotateX(180deg);

    }

    #gem .lb-tri-2 {
      clip-path: polygon(50% 16%, 32% 28%, 37% 13%);
      background-color: #2f5db2;
      transform: rotateX(180deg);
    }

    #gem .lt-tri-3 {
      clip-path: polygon(50% 16%, 50% 0, 37% 13%);
      background-color: #47709d;
    }

    #gem .rt-tri-3 {
      clip-path: polygon(50% 16%, 50% 0, 37% 13%);
      background-color: #78c4e7;
      transform: rotateY(180deg);
    }

    #gem .rb-tri-3 {
      clip-path: polygon(50% 16%, 50% 0, 37% 13%);
      background-color: #67d2a2;
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-3 {
      clip-path: polygon(50% 16%, 50% 0, 37% 13%);
      background-color: #52b0e5;
      transform: rotateX(180deg);
    }

    #gem .lt-tri-4 {
      clip-path: polygon(5% 0, 50% 0, 37% 13%);
      background-color: #2493d8;
    }

    #gem .rt-tri-4 {
      clip-path: polygon(5% 0, 50% 0, 37% 13%);
      background-color: #1e8eb3;
      transform: rotateY(180deg);
    }

    #gem .rb-tri-4 {
      clip-path: polygon(5% 0, 50% 0, 37% 13%);
      background-color: #1f5591;
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-4 {
      clip-path: polygon(5% 0, 50% 0, 37% 13%);
      background-color: #24498b;
      transform: rotateX(180deg);
    }

    #gem .lt-tri-5 {
      clip-path: polygon(16% 0, 37% 13%, 14% 21%);
      background-color: #73c7eb;
    }

    #gem .rt-tri-5 {
      clip-path: polygon(16% 0, 37% 13%, 14% 21%);
      background-color: #6892c4;
      transform: rotateY(180deg);
    }

    #gem .rb-tri-5 {
      clip-path: polygon(16% 0, 37% 13%, 14% 21%);
      background-color: #4c75ce;
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-5 {
      clip-path: polygon(16% 0, 37% 13%, 14% 21%);
      background-color: #64b2c8;
      transform: rotateX(180deg);
    }

    #gem .lt-tri-6 {
      clip-path: polygon(37% 13%, 14% 21%, 18% 36%, 32% 28%);
      background-color: #40bddb;
    }

    #gem .rt-tri-6 {
      clip-path: polygon(37% 13%, 14% 21%, 18% 36%, 32% 28%);
      background-color: #94d2f2;
      transform: rotateY(180deg);
    }

    #gem .rb-tri-6 {
      clip-path: polygon(37% 13%, 14% 21%, 18% 36%, 32% 28%);
      background-color: #5fccf1;
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-6 {
      clip-path: polygon(37% 13%, 14% 21%, 18% 36%, 32% 28%);
      background-color: #487eba;
      transform: rotateX(180deg);
    }

    #gem .lt-tri-7 {
      clip-path: polygon(0% 36%, 18% 36%, 14% 21%);
      background-color: #3663a2;
    }

    #gem .rt-tri-7 {
      clip-path: polygon(0% 36%, 18% 36%, 14% 21%);
      background-color: #76c8e4;
      transform: rotateY(180deg);
    }

    #gem .rb-tri-7 {
      clip-path: polygon(0% 36%, 18% 36%, 14% 21%);
      background-color: #3c79b8;
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-7 {
      clip-path: polygon(0% 36%, 18% 36%, 14% 21%);
      background-color: #3e4776;
      transform: rotateX(180deg);
    }

    #gem .lt-tri-8 {
      clip-path: polygon(0% 50%, 18% 36%, 0% 32%);
      background-color: #72c6e5;
    }

    #gem .rt-tri-8 {
      clip-path: polygon(0% 50%, 18% 36%, 0% 32%);
      background-color: #4272ae;
      transform: rotateY(180deg);
    }

    #gem .rb-tri-8 {
      clip-path: polygon(0% 50%, 18% 36%, 0% 32%);
      background-color: #4b6eae;
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-8 {
      clip-path: polygon(0% 50%, 18% 36%, 0% 32%);
      background-color: #76c5e9;
      transform: rotateX(180deg);
    }


    .effect {
      position: absolute;
      max-width: 2rem;
      max-height: 2rem;
      transform-origin: center;
    }

    .effect-1 {
      top: 3rem;
      left: 0rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    .effect-2 {
      top: 3rem;
      right: 0rem;
      animation: 1s linear .4s infinite alternate sparkle;
    }

    .effect-3 {
      bottom: 3rem;
      left: 0rem;
      animation: 1s linear .3s infinite alternate sparkle;
    }

    .effect-4 {
      bottom: 3rem;
      right: 0rem;
      animation: 1s linear .8s infinite alternate sparkle;
    }

    .effect-5 {
      bottom: 45%;
      right: 13%;
      animation: 1s linear .5s infinite alternate sparkle;
    }

    .effect-6 {
      bottom: 45%;
      left: 13%;
      animation: 1s linear .2s infinite alternate sparkle;
    }

    @keyframes sparkle {
      from {
        transform: scale(0.2);
      }

      to {
        transform: scale(1.2);
      }
    }
  </style>
  <script src="jquery.js" defer></script>
  <script src="tilt.jquery.js" defer></script>
</head>

<body>
  <header>
    <h1 class="lt">Such</h1>
    <h1 class="rt">A</h1>
    <h1 class="lb">Little</h1>
    <h1 class="rb">Gem</h1>
  </header>
  <main>
    <p class="caption">Aquamarine</p>
    <section class="card" data-tilt>
      <div class="overlay"></div>
      <article id="gem">
        <div class="top"></div>
        <div class="facade left-qua"></div>
        <div class="facade right-qua"></div>
        <div class="facade lt-tri-1"></div>
        <div class="facade rt-tri-1"></div>
        <div class="facade rb-tri-1"></div>
        <div class="facade lb-tri-1"></div>
        <div class="facade lt-tri-2"></div>
        <div class="facade rt-tri-2"></div>
        <div class="facade rb-tri-2"></div>
        <div class="facade lb-tri-2"></div>
        <div class="facade lt-tri-3"></div>
        <div class="facade rt-tri-3"></div>
        <div class="facade rb-tri-3"></div>
        <div class="facade lb-tri-3"></div>
        <div class="facade lt-tri-4"></div>
        <div class="facade rt-tri-4"></div>
        <div class="facade rb-tri-4"></div>
        <div class="facade lb-tri-4"></div>
        <div class="facade lt-tri-5"></div>
        <div class="facade rt-tri-5"></div>
        <div class="facade rb-tri-5"></div>
        <div class="facade lb-tri-5"></div>
        <div class="facade lt-tri-6"></div>
        <div class="facade rt-tri-6"></div>
        <div class="facade rb-tri-6"></div>
        <div class="facade lb-tri-6"></div>
        <div class="facade lt-tri-7"></div>
        <div class="facade rt-tri-7"></div>
        <div class="facade rb-tri-7"></div>
        <div class="facade lb-tri-7"></div>
        <div class="facade lt-tri-8"></div>
        <div class="facade rt-tri-8"></div>
        <div class="facade rb-tri-8"></div>
        <div class="facade lb-tri-8"></div>
      </article>
      <aside class="effect-group">
        <img class="effect effect-1" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-2" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-3" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-4" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-5" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-6" src="./assets/images/sparkling.png" alt="">
      </aside>
    </section>
  </main>
  <footer>
    <span><a href="https://jeromejoh.github.io/" target="_blank" title="author's page">&copy; Jerome Joh</a>, All right
      reserved.</span>
  </footer>
</body>

</html>
