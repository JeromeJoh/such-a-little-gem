<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="shortcut icon"
    href="https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-mono/128/Gem-Stone-icon.png" width="128"
    height="128" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <title>Such A Little Gem —— ephemeral blaze in your browser</title>
  <style>
    *,
    *::after,
    *::before {
      padding: 0;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #000;
      min-height: 100vh;
      height: 100%;
      color: #fff;
      font-family: 'Roboto Serif';
    }

    header {
      position: fixed;
      width: 100%;
      height: 100%;
      color: white;
      user-select: none;
      pointer-events: none;
    }

    header h1 {
      position: absolute;
      padding: 1rem 2rem;
      font-family: 'Cinzel Decorative';
      font-size: 1rem;
      font-weight: bolder;
    }

    .lt {
      top: 1rem;
      left: 1rem;
    }

    .rt {
      top: 1rem;
      right: 1rem;
    }

    .lb {
      bottom: 1rem;
      left: 1rem;
    }

    .rb {
      bottom: 1rem;
      right: 1rem;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .card {
      position: relative;
      width: 265px;
      height: 374px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      border-radius: .5rem;
      transition: all 1s;
      cursor: pointer;
      overflow: hidden;
      background-image: url(./assets/images/frame.svg);
      /* transform-style: preserve-3d; */
    }

    .card:hover {
      box-shadow: 0 0 5px rgba(255, 255, 255, .4),
        0 0 25px rgba(255, 255, 255, .4),
        0 0 50px rgba(255, 255, 255, .4),
        0 0 200px rgba(255, 255, 255, .4);
    }

    .overlay {
      position: absolute;
      top: 0px;
      left: 0;
      width: 100%;
      height: 975px;
      background: linear-gradient(45deg, #757575 0%, #9E9E9E 45%, #E8E8E8 70%, #9E9E9E 85%, #757575 90% 100%);
      /* background: linear-gradient(45deg, #B67B03 0%, #DAAF08 45%, #FEE9A0 70%, #DAAF08 85%, #B67B03 90% 100%); */
      animation: gradient 2s linear 0s alternate infinite;
    }

    @keyframes gradient {
      from {
        top: 0px;
      }

      to {
        top: -600px;
      }
    }

    .frame {
      position: absolute;
      inset: 0;
    }

    .caption {
      font-family: 'Cinzel Decorative';
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin: 2rem;
      text-shadow: 0 0 5px #fff;
    }

    #gem {
      position: relative;
      width: 20rem;
      height: 20rem;
      display: grid;
      place-items: center;
      transform: scale(36%);
      /* transform: translateZ(1rem); */
    }

    #gem .square {
      width: 12rem;
      height: 12rem;
      background-color: #160c10;
      transform: rotate(45deg);
    }

    #gem .square-effect {
      position: absolute;
      width: 12rem;
      height: 12rem;
      background-color: white;
      opacity: 0;
      transform: rotate(45deg);
      animation: 2s linear 2s infinite glisten;
      transition: all 1s;
    }

    @keyframes glisten {
      from {
        opacity: 0;
      }

      80% {
        opacity: 0;
      }

      90% {
        opacity: .3;
      }

      to {
        opacity: 0;
      }
    }

    #gem .triangle {
      position: absolute;
      width: 12rem;
      height: 12rem;
      clip-path: polygon(0 0, 100% 0, 50% 13%);
    }

    #gem .triangle-1 {
      top: 0;
      left: 4rem;
      background-color: #120e0f;
    }

    #gem .triangle-2 {
      left: 4rem;
      bottom: 0;
      background-color: #9c9696;
      transform: rotate(180deg);
    }

    #gem .triangle-3 {
      top: 4rem;
      left: 0;
      background-color: #574f4d;
      transform: rotate(-90deg);
    }

    #gem .triangle-4 {
      top: 4rem;
      right: 0;
      background-color: #262223;
      transform: rotate(90deg);
    }

    #gem .trapezoid {
      position: absolute;
      width: 12rem;
      height: 12rem;
      clip-path: polygon(0 0, 100% 0, 74% 45%, 26% 45%);
    }

    #gem .trapezoid-1 {
      top: -4.4rem;
      left: -4.4rem;
      background-color: #c3c1c6;
      transform: rotate(135deg);
    }

    #gem .trapezoid-2 {
      top: -4.4rem;
      right: -4.4rem;
      background-color: #b3b1b4;
      transform: rotate(-135deg);
    }

    #gem .trapezoid-3 {
      bottom: -4.4rem;
      left: -4.4rem;
      background-color: #3a3132;
      transform: rotate(45deg);
    }

    #gem .trapezoid-4 {
      bottom: -4.4rem;
      right: -4.4rem;
      background-color: #3f3a3e;
      transform: rotate(-45deg);
    }

    #gem .effect {
      position: absolute;
      max-width: 4rem;
      max-height: 4rem;
      transform-origin: center;
    }

    .effect-1 {
      top: 2rem;
      left: -2rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    .effect-2 {
      animation: 2s ease-in 1.6s infinite spin;
      opacity: 0;
    }

    .effect-3 {
      top: -2rem;
      right: 2rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    .effect-4 {
      top: 2rem;
      right: -2rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    @keyframes sparkle {
      from {
        transform: scale(0.2);
      }

      to {
        transform: scale(1.2);
      }
    }

    @keyframes spin {
      from {
        top: 8rem;
        right: 0rem;
        transform: rotate(0) scale(1.6);
        opacity: 1;
      }

      30% {
        top: 16rem;
        right: 8rem;
        transform: rotate(360deg) scale(0);
        opacity: 1;
      }

      to {
        top: 16rem;
        right: 8rem;
        transform: rotate(360deg) scale(0);
        opacity: 1;
      }
    }

    footer {
      margin-top: auto;
      padding: 2rem 0;
      text-align: center;
      font-family: 'Cinzel Decorative';
      font-size: .8rem;
      font-weight: 500;
    }

    footer a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
  <script src="jquery.js" defer></script>
  <script src="tilt.jquery.js" defer></script>
</head>

<body>
  <header>
    <h1 class="lt">Such</h1>
    <h1 class="rt">A</h1>
    <h1 class="lb">Little</h1>
    <h1 class="rb">Gem</h1>
  </header>
  <main>
    <p class="caption">Obsidian</p>
    <section class="card" data-tilt>
      <div class="overlay"></div>
      <img class="frame" src="./assets/images/frame.svg" alt="">
      <article id="gem">
        <div class="square"></div>
        <div class="square-effect"></div>
        <div class="triangle triangle-1"></div>
        <div class="triangle triangle-2"></div>
        <div class="triangle triangle-3"></div>
        <div class="triangle triangle-4"></div>
        <div class="trapezoid trapezoid-1"></div>
        <div class="trapezoid trapezoid-2"></div>
        <div class="trapezoid trapezoid-3"></div>
        <div class="trapezoid trapezoid-4"></div>
        <img class="effect effect-1" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-2" src="./assets/images/spinning.png" alt="">
        <img class="effect effect-3" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-4" src="./assets/images/sparkling.png" alt="">
      </article>
    </section>
  </main>
  <footer>
    <span><a href="https://jeromejoh.github.io/" target="_blank" title="author's page">&copy; Jerome Joh</a>, All right
      reserved.</span>
  </footer>
</body>

</html>
