<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="shortcut icon"
    href="https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-mono/128/Gem-Stone-icon.png" width="128"
    height="128" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <title>Such A Little Gem —— ephemeral blaze in your browser</title>
  <style>
    *,
    *::after,
    *::before {
      padding: 0;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #000;
      min-height: 100vh;
      height: 100%;
      color: #fff;
      font-family: 'Roboto Serif';
    }

    header {
      position: fixed;
      width: 100%;
      height: 100%;
      color: white;
      user-select: none;
      pointer-events: none;
    }

    header h1 {
      position: absolute;
      padding: 1rem 2rem;
      font-family: 'Cinzel Decorative';
      font-size: 1rem;
      font-weight: bolder;
    }

    .lt {
      top: 1rem;
      left: 1rem;
    }

    .rt {
      top: 1rem;
      right: 1rem;
    }

    .lb {
      bottom: 1rem;
      left: 1rem;
    }

    .rb {
      bottom: 1rem;
      right: 1rem;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .card {
      position: relative;
      width: 265px;
      height: 374px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      border-radius: .5rem;
      transition: all 1s;
      cursor: pointer;
      overflow: hidden;
      background-image: url(./assets/images/frame.svg);
      /* transform-style: preserve-3d; */
    }

    .card:hover {
      box-shadow: 0 0 5px rgba(255, 255, 255, .4),
        0 0 25px rgba(255, 255, 255, .4),
        0 0 50px rgba(255, 255, 255, .4),
        0 0 200px rgba(255, 255, 255, .4);
    }

    .overlay {
      position: absolute;
      top: 0px;
      left: 0;
      width: 100%;
      height: 975px;
      background: linear-gradient(45deg, #757575 0%, #9E9E9E 45%, #E8E8E8 70%, #9E9E9E 85%, #757575 90% 100%);
      /* background: linear-gradient(45deg, #B67B03 0%, #DAAF08 45%, #FEE9A0 70%, #DAAF08 85%, #B67B03 90% 100%); */
      animation: gradient 2s linear 0s alternate infinite;
    }

    @keyframes gradient {
      from {
        top: 0px;
      }

      to {
        top: -600px;
      }
    }

    .frame {
      position: absolute;
      inset: 0;
    }

    .caption {
      font-family: 'Cinzel Decorative';
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin: 2rem;
      text-shadow: 0 0 5px #fff;
    }

    #gem {
      position: relative;
      bottom: 4%;
      width: 20rem;
      height: 20rem;
      display: grid;
      place-items: center;
      border-radius: 100%;
      overflow: hidden;
      background: radial-gradient(#bcbcb2, #d5d6d0 70%);
      box-shadow: 0 2px 10px gray;
      transform: scale(36%);
      /* transform: translateZ(1rem); */
    }

    #gem::before {
      content: '';
      position: absolute;
      top: 1rem;
      left: 4rem;
      z-index: 20;
      width: 12rem;
      height: 8rem;
      border-radius: 80% 60%;
      background-color: #f4f8f9;
      filter: blur(1rem);
      animation: breath 2s alternate infinite 0s;
    }

    #gem::after {
      content: '';
      position: absolute;
      bottom: 3rem;
      left: 5rem;
      z-index: 20;
      width: 10rem;
      height: 6rem;
      border-radius: 80% 70%;
      background-color: #f4f8f9;
      filter: blur(1rem);
      animation: breath 4s alternate infinite 0s;
    }

    @keyframes breath {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.15);
      }
    }

    #gem .blush-l {
      position: absolute;
      top: 2rem;
      left: 1rem;
      width: 6rem;
      height: 10rem;
      background-color: #cdbaac;
      border-radius: 100%;
      filter: blur(1rem);
    }

    #gem .blush-r {
      position: absolute;
      top: 2rem;
      right: 1rem;
      width: 6rem;
      height: 10rem;
      background-color: #cdbaac;
      border-radius: 100%;
      filter: blur(1rem);
    }



    footer {
      margin-top: auto;
      padding: 2rem 0;
      text-align: center;
      font-family: 'Cinzel Decorative';
      font-size: .8rem;
      font-weight: 500;
    }

    footer a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
  <script src="jquery.js" defer></script>
  <script src="tilt.jquery.js" defer></script>
</head>

<body>
  <header>
    <h1 class="lt">Such</h1>
    <h1 class="rt">A</h1>
    <h1 class="lb">Little</h1>
    <h1 class="rb">Gem</h1>
  </header>
  <main>
    <p class="caption">Pearl</p>
    <section class="card" data-tilt>
      <div class="overlay"></div>
      <img class="frame" src="./assets/images/ellipse.svg" alt="">
      <article id="gem">
        <div class="blush-l"></div>
        <div class="blush-r"></div>
      </article>
    </section>
  </main>
  <footer>
    <span><a href="https://jeromejoh.github.io/" target="_blank" title="author's page">&copy; Jerome Joh</a>, All right
      reserved.</span>
  </footer>
</body>

</html>
