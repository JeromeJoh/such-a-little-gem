<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="shortcut icon"
    href="https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-mono/128/Gem-Stone-icon.png" width="128"
    height="128" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <title>Such A Little Gem —— ephemeral blaze in your browser</title>
  <style>
    :root {
      font-size: 12px;
    }

    *,
    *::after,
    *::before {
      padding: 0;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #000;
      min-height: 100vh;
      height: 100%;
      color: #fff;
      font-family: 'Roboto Serif';
    }

    header {
      position: fixed;
      width: 100%;
      height: 100%;
      color: white;
      user-select: none;
      pointer-events: none;
    }

    header h1 {
      position: absolute;
      padding: 1rem 2rem;
      font-family: 'Cinzel Decorative';
      font-size: 1rem;
      font-weight: bolder;
    }

    .lt {
      top: 1rem;
      left: 1rem;
    }

    .rt {
      top: 1rem;
      right: 1rem;
    }

    .lb {
      bottom: 1rem;
      left: 1rem;
    }

    .rb {
      bottom: 1rem;
      right: 1rem;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .card {
      position: relative;
      width: 265px;
      height: 374px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      background-image: url(./assets/images/frame.svg);
      border-radius: .5rem;
      transition: all 1s;
      cursor: pointer;
      overflow: hidden;
      /* transform-style: preserve-3d; */
    }

    .card:hover {
      box-shadow: 0 0 5px rgba(255, 255, 255, .4),
        0 0 25px rgba(255, 255, 255, .4),
        0 0 50px rgba(255, 255, 255, .4),
        0 0 200px rgba(255, 255, 255, .4);
    }

    .overlay {
      position: absolute;
      top: 0px;
      left: 0;
      width: 100%;
      height: 975px;
      background: linear-gradient(45deg, #757575 0%, #9E9E9E 45%, #E8E8E8 70%, #9E9E9E 85%, #757575 90% 100%);
      /* background: linear-gradient(45deg, #B67B03 0%, #DAAF08 45%, #FEE9A0 70%, #DAAF08 85%, #B67B03 90% 100%); */
      animation: gradient 2s linear 0s alternate infinite;
    }

    @keyframes gradient {
      from {
        top: 0px;
      }

      to {
        top: -600px;
      }
    }

    .frame {
      position: absolute;
      inset: 0;
    }

    .caption {
      font-family: 'Cinzel Decorative';
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin: 2rem;
      text-shadow: 0 0 5px #fff;
    }

    #gem {
      position: relative;
      width: 20rem;
      height: 20rem;
      display: grid;
      place-items: center;
      transform: scale(28%);
      /* overflow: hidden; */
      /* transform: translateZ(1.5rem); */
    }

    #gem .facade {
      position: absolute;
      width: 20rem;
      height: 30rem;
    }

    #gem .top-tri {
      background: #1e874a;
      clip-path: polygon(32% 20%, 50% 30%, 68% 20%);
    }

    #gem .bottom-tri {
      background: #bdecdf;
      clip-path: polygon(32% 20%, 50% 30%, 68% 20%);
      transform: rotateX(180deg);
    }

    #gem .top-qua-1 {
      background: #43986e;
      clip-path: polygon(68% 20%, 32% 20%, 26% 13%, 74% 13%);
    }

    #gem .bottom-qua-1 {
      background: #37ae6a;
      clip-path: polygon(68% 20%, 32% 20%, 26% 13%, 74% 13%);
      transform: rotateX(180deg);
    }

    #gem .top-qua-2 {
      background: #87b5af;
      clip-path: polygon(80% 7%, 20% 7%, 26% 13%, 74% 13%);
    }

    #gem .bottom-qua-2 {
      background: #0d1e1b;
      clip-path: polygon(80% 7%, 20% 7%, 26% 13%, 74% 13%);
      transform: rotateX(180deg);
    }

    #gem .top-qua-3 {
      background: #184f41;
      clip-path: polygon(86% 0, 14% 0, 20% 7%, 80% 7%);
    }

    #gem .bottom-qua-3 {
      background-image: linear-gradient(to right, #11422d 20%, #49947f 60%);
      clip-path: polygon(86% 0, 14% 0, 20% 7%, 80% 7%);
      transform: rotateX(180deg);
    }

    #gem .lt-tri-1 {
      background: #0c2116;
      clip-path: polygon(32% 20%, 26% 13%, 21% 17%);
    }

    #gem .rt-tri-1 {
      background-color: #46a582;
      clip-path: polygon(32% 20%, 26% 13%, 21% 17%);
      transform: rotateY(180deg);
    }

    #gem .rb-tri-1 {
      background: #1e603d;
      clip-path: polygon(32% 20%, 26% 13%, 21% 17%);
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-1 {
      background: #134a2c;
      clip-path: polygon(32% 20%, 26% 13%, 21% 17%);
      transform: rotateX(180deg);
    }

    #gem .lt-tri-2 {
      background: #f1fcfd;
      clip-path: polygon(26% 13%, 21% 17%, 10% 14%, 20% 7%);
    }

    #gem .rt-tri-2 {
      background: #2b6f57;
      clip-path: polygon(26% 13%, 21% 17%, 10% 14%, 20% 7%);
      transform: rotateY(180deg);
    }

    #gem .rb-tri-2 {
      background: #50bc9d;
      clip-path: polygon(26% 13%, 21% 17%, 10% 14%, 20% 7%);
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-2 {
      background: #0c7a3e;
      clip-path: polygon(26% 13%, 21% 17%, 10% 14%, 20% 7%);
      transform: rotateX(180deg);
    }

    #gem .lt-tri-3 {
      background: #88cbc4;
      clip-path: polygon(0 11%, 10% 14%, 20% 7%, 14% 0);
    }

    #gem .rt-tri-3 {
      background: #60ba97;
      clip-path: polygon(0 11%, 10% 14%, 20% 7%, 14% 0);
      transform: rotateY(180deg);
    }

    #gem .rb-tri-3 {
      background: #051410;
      clip-path: polygon(0 11%, 10% 14%, 20% 7%, 14% 0);
      transform: rotateY(180deg) rotateX(180deg);
    }

    #gem .lb-tri-3 {
      background: #0a2019;
      clip-path: polygon(0 11%, 10% 14%, 20% 7%, 14% 0);
      transform: rotateX(180deg);
    }

    #gem .left-bar-1 {
      background: #1c9047;
      clip-path: polygon(32% 20%, 50% 30%, 50% 70%, 32% 80%);
    }

    #gem .left-bar-1-shadow {
      background-color: black;
      opacity: 0;
      clip-path: polygon(32% 20%, 50% 30%, 50% 70%, 32% 80%);
      animation: reflect 2s linear 1s alternate infinite;
    }

    @keyframes reflect {
      from {
        opacity: 0;
      }

      to {
        opacity: .3;
      }
    }

    #gem .right-bar-1 {
      background: #4ec699;
      clip-path: polygon(32% 20%, 50% 30%, 50% 70%, 32% 80%);
      transform: rotateY(180deg);
    }

    #gem .left-bar-2 {
      background-image: linear-gradient(to top, #16432e 40%, #46906f 60%);
      clip-path: polygon(32% 20%, 32% 80%, 21% 83%, 21% 17%);
    }

    #gem .right-bar-2 {
      background: #32ac87;
      clip-path: polygon(32% 20%, 32% 80%, 21% 83%, 21% 17%);
      transform: rotateY(180deg);
    }

    #gem .left-bar-3 {
      background: #0a251a;
      clip-path: polygon(21% 83%, 21% 17%, 10% 14%, 10% 86%);
    }

    #gem .right-bar-3 {
      background: #09271d;
      clip-path: polygon(21% 83%, 21% 17%, 10% 14%, 10% 86%);
      transform: rotateY(180deg);
    }

    #gem .left-bar-4 {
      background-image: linear-gradient(to bottom, #193b37 50%, #44796d 70%);
      clip-path: polygon(10% 14%, 10% 86%, 0 89%, 0 11%);
    }

    #gem .right-bar-4 {
      background-image: linear-gradient(to bottom, #152f22 30%, #1d533c 60%);
      clip-path: polygon(10% 14%, 10% 86%, 0 89%, 0 11%);
      transform: rotateY(180deg);
    }

    #gem .effect {
      position: absolute;
      max-width: 6rem;
      max-height: 6rem;
      transform-origin: center;
    }

    .effect-1 {
      top: -3rem;
      left: 1rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    .effect-2 {
      top: -3rem;
      right: 1rem;
      animation: 1s linear .7s infinite alternate sparkle;
    }

    .effect-3 {
      bottom: -3rem;
      left: 1rem;
      animation: 1s linear 1s infinite alternate sparkle;
    }

    .effect-4 {
      bottom: -3rem;
      right: 1rem;
      animation: 1s linear .4s infinite alternate sparkle;
    }

    @keyframes sparkle {
      from {
        transform: scale(0.2);
      }

      to {
        transform: scale(1.2);
      }
    }

    footer {
      margin-top: auto;
      padding: 2rem 0;
      text-align: center;
      font-family: 'Cinzel Decorative';
      font-size: .8rem;
      font-weight: 500;
    }

    footer a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
  <script src="jquery.js" defer></script>
  <script src="tilt.jquery.js" defer></script>
</head>

<body>
  <header>
    <h1 class="lt">Such</h1>
    <h1 class="rt">A</h1>
    <h1 class="lb">Little</h1>
    <h1 class="rb">Gem</h1>
  </header>
  <main>
    <p class="caption">Emerald</p>
    <section class="card" data-tilt>
      <div class="overlay"></div>
      <img class="frame" src="./assets/images/frame.svg" alt="">
      <article id="gem">
        <div class="facade top-tri"></div>
        <div class="facade bottom-tri"></div>
        <div class="facade top-qua-1"></div>
        <div class="facade bottom-qua-1"></div>
        <div class="facade top-qua-2"></div>
        <div class="facade bottom-qua-2"></div>
        <div class="facade top-qua-3"></div>
        <div class="facade bottom-qua-3"></div>
        <div class="facade lt-tri-1"></div>
        <div class="facade rt-tri-1"></div>
        <div class="facade rb-tri-1"></div>
        <div class="facade lb-tri-1"></div>
        <div class="facade lt-tri-2"></div>
        <div class="facade rt-tri-2"></div>
        <div class="facade rb-tri-2"></div>
        <div class="facade lb-tri-2"></div>
        <div class="facade lt-tri-3"></div>
        <div class="facade rt-tri-3"></div>
        <div class="facade rb-tri-3"></div>
        <div class="facade lb-tri-3"></div>
        <div class="facade left-bar-1"></div>
        <div class="facade left-bar-1-shadow"></div>
        <div class="facade right-bar-1"></div>
        <div class="facade left-bar-2"></div>
        <div class="facade right-bar-2"></div>
        <div class="facade left-bar-3"></div>
        <div class="facade right-bar-3"></div>
        <div class="facade left-bar-4"></div>
        <div class="facade right-bar-4"></div>
        <img class="effect effect-1" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-2" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-3" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-4" src="./assets/images/sparkling.png" alt="">
      </article>
    </section>
  </main>
  <footer>
    <span><a href="https://jeromejoh.github.io/" target="_blank" title="author's page">&copy; Jerome Joh</a>, All right
      reserved.</span>
  </footer>
</body>

</html>
