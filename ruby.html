<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="shortcut icon"
    href="https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-mono/128/Gem-Stone-icon.png" width="128"
    height="128" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <title>Such A Little Gem —— ephemeral blaze in your browser</title>
  <style>
    :root {
      font-size: 12px;
    }

    *,
    *::after,
    *::before {
      padding: 0;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #000;
      min-height: 100vh;
      height: 100%;
      color: #fff;
      font-family: 'Roboto Serif';
    }

    header {
      position: fixed;
      width: 100%;
      height: 100%;
      color: white;
      user-select: none;
      pointer-events: none;
    }

    header h1 {
      position: absolute;
      padding: 1rem 2rem;
      font-family: 'Cinzel Decorative';
      font-size: 1rem;
      font-weight: bolder;
    }

    .lt {
      top: 1rem;
      left: 1rem;
    }

    .rt {
      top: 1rem;
      right: 1rem;
    }

    .lb {
      bottom: 1rem;
      left: 1rem;
    }

    .rb {
      bottom: 1rem;
      right: 1rem;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .card {
      position: relative;
      width: 265px;
      height: 374px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      background-image: url(./assets/images/frame.svg);
      border-radius: .5rem;
      transition: all 1s;
      cursor: pointer;
      overflow: hidden;
      /* transform-style: preserve-3d; */
    }

    .card:hover {
      box-shadow: 0 0 5px rgba(255, 255, 255, .4),
        0 0 25px rgba(255, 255, 255, .4),
        0 0 50px rgba(255, 255, 255, .4),
        0 0 200px rgba(255, 255, 255, .4);
    }

    .overlay {
      position: absolute;
      top: 0px;
      left: 0;
      width: 100%;
      height: 975px;
      background: linear-gradient(45deg, #757575 0%, #9E9E9E 45%, #E8E8E8 70%, #9E9E9E 85%, #757575 90% 100%);
      /* background: linear-gradient(45deg, #B67B03 0%, #DAAF08 45%, #FEE9A0 70%, #DAAF08 85%, #B67B03 90% 100%); */
      animation: gradient 2s linear 0s alternate infinite;
    }

    @keyframes gradient {
      from {
        top: 0px;
      }

      to {
        top: -600px;
      }
    }

    .frame {
      position: absolute;
      inset: 0;
    }

    .caption {
      font-family: 'Cinzel Decorative';
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin: 2rem;
      text-shadow: 0 0 5px #fff;
    }

    #gem {
      position: relative;
      width: 20rem;
      height: 20rem;
      display: grid;
      place-items: center;
      transform: scale(40%);
      /* transform: translateZ(1.5rem); */
    }

    #gem .top {
      position: relative;
      bottom: 6%;
      width: 12rem;
      height: 12rem;
      background: linear-gradient(to bottom, #fb85b2, transparent),
        linear-gradient(45deg, #dd2281, transparent),
        linear-gradient(135deg, transparent, #ea706a);
      clip-path: polygon(50% 2%, 92% 25%, 92% 75%, 50% 100%, 8% 75%, 8% 25%, 50% 2%);
    }

    #gem .top-effect {
      position: absolute;
      bottom: 16%;
      width: 16rem;
      height: 16rem;
      clip-path: polygon(50% 100%, 96% 23%, 4% 23%);
      background-color: #fff;
      opacity: 0.4;
      z-index: 30;
      animation: 2s linear 2s infinite glisten;
    }

    @keyframes glisten {
      from {
        opacity: .5;
      }

      80% {
        opacity: .5;
      }

      90% {
        opacity: .8;
      }

      to {
        opacity: .5;
      }
    }

    #gem .facade {
      position: absolute;
      inset: 0;
      width: 20rem;
      height: 20rem;
    }

    #gem .facade-1 {
      clip-path: polygon(50% 84%, 32% 84%, 25% 59%, 50% 74%);
      background-color: #5b0414;
    }

    #gem .facade-10 {
      clip-path: polygon(50% 84%, 32% 84%, 25% 59%, 50% 74%);
      background-color: #8f0437;
      transform: rotateY(180deg);
    }

    #gem .facade-2 {
      clip-path: polygon(50% 84%, 32% 84%, 50% 100%);
      background-color: #cd051d;
    }

    #gem .facade-11 {
      clip-path: polygon(50% 84%, 32% 84%, 50% 100%);
      background-color: #4b0826;
      transform: rotateY(180deg);
    }

    #gem .facade-3 {
      clip-path: polygon(32% 84%, 25% 59%, 16% 64%);
      background-color: #ec0050;
    }

    #gem .facade-12 {
      clip-path: polygon(32% 84%, 25% 59%, 16% 64%);
      background-color: #b61316;
      transform: rotateY(180deg);
    }

    #gem .facade-4 {
      clip-path: polygon(8% 40%, 25% 59%, 16% 64%);
      background-color: #ca091d;
    }

    #gem .facade-13 {
      clip-path: polygon(8% 40%, 25% 59%, 16% 64%);
      background-color: #960c5e;
      transform: rotateY(180deg);
    }

    #gem .facade-5 {
      clip-path: polygon(8% 40%, 25% 59%, 25% 29%, 14% 23%);
      background-color: #86081a;
    }

    #gem .facade-14 {
      clip-path: polygon(8% 40%, 25% 59%, 25% 29%, 14% 23%);
      background-color: #fd395d;
      transform: rotateY(180deg);
    }

    #gem .facade-6 {
      clip-path: polygon(8% 40%, 14% 23%, 2% 18%);
      background-color: #fd0a48;
    }

    #gem .facade-15 {
      clip-path: polygon(8% 40%, 14% 23%, 2% 18%);
      background-color: #3d0424;
      transform: rotateY(180deg);
    }

    #gem .facade-7 {
      clip-path: polygon(20% 8%, 14% 23%, 2% 18%);
      background-color: #f33b5e;
    }

    #gem .facade-16 {
      clip-path: polygon(20% 8%, 14% 23%, 2% 18%);
      background-color: #651221;
      transform: rotateY(180deg);
    }

    #gem .facade-8 {
      clip-path: polygon(20% 8%, 14% 23%, 25% 29%, 50% 15%);
      background-color: #620a2d;
    }

    #gem .facade-17 {
      clip-path: polygon(20% 8%, 14% 23%, 25% 29%, 50% 15%);
      background-color: #cc041e;
      transform: rotateY(180deg);
    }

    #gem .facade-9 {
      clip-path: polygon(20% 8%, 50% 15%, 50% 5%);
      background-color: #f93099;
    }

    #gem .facade-18 {
      clip-path: polygon(20% 8%, 50% 15%, 50% 5%);
      background-color: #ec3630;
      transform: rotateY(180deg);
    }

    #gem .effect {
      position: absolute;
      max-width: 4rem;
      max-height: 4rem;
      transform-origin: center;
    }

    .effect-1 {
      top: 6rem;
      left: -0.5rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    .effect-2 {
      animation: 2s ease-in 1.6s infinite spin;
      opacity: 0;
    }

    .effect-3 {
      top: 1rem;
      left: 8rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    .effect-4 {
      top: 6rem;
      right: -0.5rem;
      animation: 1s linear 0s infinite alternate sparkle;
    }

    @keyframes sparkle {
      from {
        transform: scale(0.2);
      }

      to {
        transform: scale(1.2);
      }
    }

    @keyframes spin {
      from {
        top: 3rem;
        right: 1rem;
        transform: rotate(0) scale(1.6);
        opacity: 1;
      }

      30% {
        top: 16rem;
        right: 8rem;
        transform: rotate(360deg) scale(0);
        opacity: 1;
      }

      to {
        top: 16rem;
        right: 8rem;
        transform: rotate(360deg) scale(0);
        opacity: 1;
      }
    }

    footer {
      margin-top: auto;
      padding: 2rem 0;
      text-align: center;
      font-family: 'Cinzel Decorative';
      font-size: .8rem;
      font-weight: 500;
    }

    footer a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
  <script src="jquery.js" defer></script>
  <script src="tilt.jquery.js" defer></script>
</head>

<body>
  <header>
    <h1 class="lt">Such</h1>
    <h1 class="rt">A</h1>
    <h1 class="lb">Little</h1>
    <h1 class="rb">Gem</h1>
  </header>
  <main>
    <p class="caption">Ruby</p>
    <section class="card" data-tilt>
      <div class="overlay"></div>
      <img class="frame" src="./assets/images/frame.svg" alt="">
      <article id="gem">
        <div class="top"></div>
        <div class="top-effect"></div>
        <div class="facade facade-1"></div>
        <div class="facade facade-2"></div>
        <div class="facade facade-3"></div>
        <div class="facade facade-4"></div>
        <div class="facade facade-5"></div>
        <div class="facade facade-6"></div>
        <div class="facade facade-7"></div>
        <div class="facade facade-8"></div>
        <div class="facade facade-9"></div>
        <div class="facade facade-10"></div>
        <div class="facade facade-11"></div>
        <div class="facade facade-12"></div>
        <div class="facade facade-13"></div>
        <div class="facade facade-14"></div>
        <div class="facade facade-15"></div>
        <div class="facade facade-16"></div>
        <div class="facade facade-17"></div>
        <div class="facade facade-18"></div>
        <img class="effect effect-1" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-2" src="./assets/images/spinning.png" alt="">
        <img class="effect effect-3" src="./assets/images/sparkling.png" alt="">
        <img class="effect effect-4" src="./assets/images/sparkling.png" alt="">
      </article>
    </section>
  </main>
  <footer>
    <span><a href="https://jeromejoh.github.io/" target="_blank" title="author's page">&copy; Jerome Joh</a>, All right
      reserved.</span>
  </footer>
</body>

</html>
